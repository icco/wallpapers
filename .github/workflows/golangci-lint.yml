name: golangci-lint
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    container: golang:1.26-alpine
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Install system dependencies
        run: apk add --no-cache imagemagick-dev pkgconf gcc musl-dev
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
